<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thanh Toán - Nguyễn Danh Thành Trung</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7000ff;
            --bg-dark: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Nền động dạng Mesh Gradient */
        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(0, 242, 254, 0.15) 0%, transparent 40%);
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 480px;
            z-index: 10;
            position: relative;
            padding: 20px 0;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .avatar-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 25px;
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.25);
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-dark);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* Đồng hồ */
        .clock-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 25px 15px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .clock-header {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            margin-bottom: 10px;
            display: block;
            opacity: 0.8;
        }

        .clock-time-wrapper {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 5px;
            margin-bottom: 8px;
        }

        .clock-time-main {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            line-height: 1;
        }

        .clock-seconds {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--secondary);
            width: 25px;
            text-align: left;
        }

        .clock-date-fancy {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .clock-date-fancy::before, .clock-date-fancy::after {
            content: '';
            width: 20px;
            height: 1px;
            background: var(--glass-border);
        }

        /* Bank List */
        .bank-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bank-group {
            display: flex;
            gap: 12px;
            align-items: stretch;
            animation: slideUp 0.6s ease backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bank-item-main {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .bank-item-main:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .qr-side-btn {
            width: 65px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--primary);
            font-size: 1.4rem;
        }

        .qr-side-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            transform: scale(1.05) rotate(8deg);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .logo-wrapper {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 6px;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .bank-info {
            text-align: left;
            flex-grow: 1;
        }

        .bank-tag {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2px;
            display: block;
        }

        .acc-status {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-style: italic;
            opacity: 0.8;
        }

        .copy-icon {
            color: var(--text-dim);
            font-size: 1.1rem;
            opacity: 0.3;
        }

        .bank-item-main:hover .copy-icon {
            opacity: 1;
            color: var(--primary);
        }

        /* Modal UI */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            place-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-card {
            background: #fff;
            color: #0f172a;
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            animation: modalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalIn {
            from { transform: scale(0.8) translateY(40px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .qr-container {
            background: #f8fafc;
            padding: 20px;
            border-radius: 30px;
            margin: 25px 0;
            border: 2px dashed #e2e8f0;
        }

        .qr-image {
            width: 100%;
            border-radius: 15px;
            display: block;
        }

        .btn-download {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 25px;
            background: var(--bg-dark);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translate(-50%, -100px);
            background: var(--primary);
            color: var(--bg-dark);
            padding: 14px 30px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.4);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translate(-50%, 0);
        }

        @media (max-width: 480px) {
            .clock-time-main { font-size: 2.4rem; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <canvas id="bgCanvas"></canvas>
    
    <div id="toast" class="toast">Đã sao chép thành công</div>

    <div class="modal-overlay" id="qrModal" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="modalBank" style="font-weight: 900; font-size: 1.2rem; text-transform: uppercase;">NGÂN HÀNG</div>
            <div class="qr-container">
                <img id="qrImg" src="" alt="Mã QR" class="qr-image">
            </div>
            <button class="btn-download" id="downloadBtn">
                <i class="fa-solid fa-download"></i> TẢI ẢNH QR
            </button>
            <button class="btn-close" onclick="closeModal()">Đóng cửa sổ</button>
        </div>
    </div>

    <div class="container">
        <!-- Thông tin cá nhân -->
        <div class="profile-section">
            <div class="avatar-box">
                <img src="https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/AVT.jpg" alt="AVT">
            </div>
            <h1>Nguyễn Danh Thành Trung</h1>
            
            <!-- Đồng hồ -->
            <div class="clock-container">
                <span class="clock-header">Hệ thống thời gian Việt Nam</span>
                <div class="clock-time-wrapper">
                    <div class="clock-time-main" id="vTimeMain">00:00</div>
                    <div class="clock-seconds" id="vSeconds">00</div>
                </div>
                <div class="clock-date-fancy" id="vDateFancy">Đang tải ngày tháng...</div>
            </div>
        </div>

        <div class="bank-list">
            <!-- Oceanbank -->
            <div class="bank-group">
                <div class="bank-item-main" onclick="copyOnly('538888888888', 'Oceanbank')">
                    <div class="logo-wrapper">
                        <img src="https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/LOGO_MBV.jpg" alt="Oceanbank">
                    </div>
                    <div class="bank-info">
                        <span class="bank-tag">Oceanbank (MBV)</span>
                        <div class="acc-status">Chạm để copy số tài khoản</div>
                    </div>
                    <i class="fa-regular fa-clone copy-icon"></i>
                </div>
                <div class="qr-side-btn" onclick="openQR('MBV', 'OCEANBANK (MBV)')">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
            </div>

            <!-- MB Bank -->
            <div class="bank-group">
                <div class="bank-item-main" onclick="copyOnly('56002005032008', 'MB Bank')">
                    <div class="logo-wrapper">
                        <img src="https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/LOGO_MB.jpg" alt="MB Bank">
                    </div>
                    <div class="bank-info">
                        <span class="bank-tag">MB Bank</span>
                        <div class="acc-status">Chạm để copy số tài khoản</div>
                    </div>
                    <i class="fa-regular fa-clone copy-icon"></i>
                </div>
                <div class="qr-side-btn" onclick="openQR('MB', 'MB BANK')">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
            </div>

            <!-- ZaloPay -->
            <div class="bank-group">
                <div class="bank-item-main" onclick="copyOnly('0981506719', 'ZaloPay')">
                    <div class="logo-wrapper">
                        <img src="https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/LOGO_ZLP.jpg" alt="ZaloPay">
                    </div>
                    <div class="bank-info">
                        <span class="bank-tag">ZaloPay</span>
                        <div class="acc-status">Chạm để copy số tài khoản</div>
                    </div>
                    <i class="fa-regular fa-clone copy-icon"></i>
                </div>
                <div class="qr-side-btn" onclick="openQR('ZLP', 'ZALOPAY')">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
            </div>

            <!-- ShopeePay -->
            <div class="bank-group">
                <div class="bank-item-main" onclick="copyOnly('0981506719', 'ShopeePay')">
                    <div class="logo-wrapper">
                        <img src="https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/LOGO_SPP.jpg" alt="ShopeePay">
                    </div>
                    <div class="bank-info">
                        <span class="bank-tag">ShopeePay</span>
                        <div class="acc-status">Chạm để copy số tài khoản</div>
                    </div>
                    <i class="fa-regular fa-clone copy-icon"></i>
                </div>
                <div class="qr-side-btn" onclick="openQR('SPP', 'SHOPEE PAY')">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
            </div>

            <!-- MoMo -->
            <div class="bank-group">
                <div class="bank-item-main" onclick="copyOnly('0981506719', 'Ví MoMo')">
                    <div class="logo-wrapper">
                        <img src="https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/LOGO_MOMO.jpg" alt="MoMo">
                    </div>
                    <div class="bank-info">
                        <span class="bank-tag">Ví MoMo</span>
                        <div class="acc-status">Chạm để copy số tài khoản</div>
                    </div>
                    <i class="fa-regular fa-clone copy-icon"></i>
                </div>
                <div class="qr-side-btn" onclick="openQR('MOMO', 'VÍ MOMO')">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cấu hình đồng hồ
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Asia/Ho_Chi_Minh' };
            const vnTime = new Date(now.toLocaleString('en-US', options));
            
            const hour = String(vnTime.getHours()).padStart(2, '0');
            const minute = String(vnTime.getMinutes()).padStart(2, '0');
            const second = String(vnTime.getSeconds()).padStart(2, '0');
            
            document.getElementById('vTimeMain').textContent = `${hour}:${minute}`;
            document.getElementById('vSeconds').textContent = second;
            
            const dateOptions = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('vDateFancy').textContent = vnTime.toLocaleDateString('vi-VN', dateOptions);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Xử lý Copy
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function copyOnly(text, label) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(`Đã chép số tài khoản ${label}`);
        }

        // Modal QR
        const qrLinks = {
            'MBV': 'https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/QR_MBV.jpg',
            'MOMO': 'https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/QR_MOMO.jpg',
            'MB': 'https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/QR_MB.jpg',
            'SPP': 'https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/QR_SPP.jpg',
            'ZLP': 'https://raw.githubusercontent.com/NgDanhThanhTrung/Bank/main/QR_ZLP.jpg'
        };

        function openQR(key, name) {
            const modal = document.getElementById('qrModal');
            document.getElementById('qrImg').src = qrLinks[key];
            document.getElementById('modalBank').innerText = name;
            modal.style.display = 'grid';
            
            document.getElementById('downloadBtn').onclick = async () => {
                try {
                    const res = await fetch(qrLinks[key]);
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `QR_${key}.jpg`;
                    a.click();
                    showToast("Đang tải ảnh...");
                } catch { window.open(qrLinks[key], '_blank'); }
            };
        }

        function closeModal() {
            document.getElementById('qrModal').style.display = 'none';
        }

        // Particles
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let pts = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            pts = [];
            for (let i = 0; i < 40; i++) {
                pts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 242, 254, 0.2)";
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        window.onload = () => { init(); animate(); };
    </script>
</body>
</html>
